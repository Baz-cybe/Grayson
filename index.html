<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wario Blast - Play Online</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 640px;
            max-width: 95%;
        }
        #game-frame {
            width: 100%;
            height: 480px;
            background-color: black;
            border-radius: 4px;
            overflow: hidden;
        }
        h1 {
            margin-top: 0;
            font-size: 22px;
            letter-spacing: 1px;
            color: #e8eaed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WARIO BLAST FEATURING BOMBERMAN</h1>
        
        <div id="game-frame"></div>
    </div>

    <script type="text/javascript">
        EJS_player = '#game-frame'; 
        EJS_core = 'gb'; // Tells EmulatorJS to run a Game Boy DMG core
        
        // ⚠️ REPLACE THIS WITH THE EXACT FILENAME OF THE GAME INSIDE YOUR FORKED REPO
        EJS_gameUrl = 'Wario Blast Featuring Bomberman (USA).gb'; 
        
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
    </script>
    <script type="text/javascript" src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
